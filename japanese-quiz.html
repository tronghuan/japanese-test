<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語クイズ • Trắc Nghiệm Tiếng Nhật</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;600;800&family=Sawarabi+Gothic&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf6ef;
    --paper2: #f3ede2;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #c9960c;
    --green: #1a6b3c;
    --green-light: #27ae60;
    --border: #d4c5a9;
    --shadow: rgba(26,18,8,0.12);
    --muted: #7a6a52;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,150,12,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(192,57,43,0.05) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 2px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '日';
    position: absolute;
    font-family: 'Shippori Mincho', serif;
    font-size: 18rem;
    color: rgba(192,57,43,0.04);
    top: -4rem;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    line-height: 1;
  }
  .header-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.25rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 0.8rem;
  }
  header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  header h1 span {
    color: var(--red);
  }
  header p.sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  /* PROGRESS */
  .progress-wrap {
    max-width: 720px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .progress-text {
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .score-badge {
    background: var(--paper2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.2rem 0.8rem;
    font-size: 0.78rem;
    color: var(--ink);
    font-weight: 500;
  }

  /* MAIN CARD */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 4rem;
  }

  .quiz-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 4px 32px var(--shadow);
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* QUESTION */
  .q-header {
    background: var(--paper2);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1.8rem 1.3rem;
    display: flex;
    gap: 1.2rem;
    align-items: flex-start;
  }
  .q-num {
    flex-shrink: 0;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.7rem;
    color: var(--red);
    letter-spacing: 0.1em;
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 2px;
    padding: 0.15rem 0.5rem;
    margin-top: 0.3rem;
  }
  .q-body { flex: 1; }
  .q-tag {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    display: block;
  }
  .q-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight: 600;
    line-height: 1.7;
    color: var(--ink);
  }
  .q-text .blank {
    display: inline-block;
    min-width: 3rem;
    border-bottom: 2.5px solid var(--red);
    color: var(--red);
    font-weight: 700;
    text-align: center;
    padding: 0 0.3rem;
    margin: 0 0.2rem;
  }

  /* VOCAB HINT */
  .vocab-strip {
    padding: 0.6rem 1.8rem;
    background: rgba(201,150,12,0.06);
    border-bottom: 1px solid rgba(201,150,12,0.2);
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }
  .vocab-label {
    font-size: 0.68rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-right: 0.2rem;
  }
  .vocab-chip {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.82rem;
    background: white;
    border: 1px solid rgba(201,150,12,0.35);
    border-radius: 3px;
    padding: 0.15rem 0.6rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink);
    position: relative;
  }
  .vocab-chip:hover {
    background: var(--gold);
    color: white;
    border-color: var(--gold);
  }

  /* VOCAB POPUP */
  .vocab-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    background: rgba(26,18,8,0.45);
    backdrop-filter: blur(3px);
  }
  .vocab-popup.open { display: flex; }
  .vocab-popup-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(26,18,8,0.25);
    max-width: 380px;
    width: 90%;
    overflow: hidden;
    animation: popIn 0.25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.9); }
    to   { opacity:1; transform: scale(1); }
  }
  .vp-top {
    background: var(--ink);
    color: white;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    justify-content: space-between;
  }
  .vp-word {
    font-family: 'Shippori Mincho', serif;
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .vp-reading {
    font-size: 0.9rem;
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
  }
  .vp-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  .vp-close:hover { color: white; }
  .vp-body { padding: 1.2rem 1.5rem; }
  .vp-type {
    font-size: 0.68rem;
    color: var(--red);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .vp-meaning {
    font-size: 1rem;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 0.8rem;
    line-height: 1.5;
  }
  .vp-example {
    background: var(--paper2);
    border-left: 3px solid var(--red);
    padding: 0.6rem 0.8rem;
    border-radius: 0 3px 3px 0;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.8;
  }
  .vp-example em {
    display: block;
    font-style: normal;
    font-size: 0.78rem;
    color: #aaa;
    margin-top: 0.3rem;
  }

  /* CHOICES */
  .choices {
    padding: 1.4rem 1.8rem 1.2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
  }
  @media (max-width: 500px) {
    .choices { grid-template-columns: 1fr; }
  }
  .choice-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--paper2);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px var(--shadow);
  }
  .choice-letter {
    flex-shrink: 0;
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 600;
    letter-spacing: 0;
    color: var(--muted);
    transition: all 0.2s;
  }
  .choice-btn:hover:not(:disabled) .choice-letter { color: var(--ink); }
  .choice-btn.correct {
    border-color: var(--green);
    background: rgba(26,107,60,0.06);
    color: var(--green);
  }
  .choice-btn.correct .choice-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .choice-btn.wrong {
    border-color: var(--red);
    background: rgba(192,57,43,0.06);
    color: var(--red);
  }
  .choice-btn.wrong .choice-letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .choice-btn:disabled { cursor: default; }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin: 0 1.8rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .explanation.show { display: block; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .exp-head {
    background: var(--paper2);
    padding: 0.6rem 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .exp-head::before {
    content: '解説';
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .exp-body {
    padding: 0.9rem 1rem;
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--ink);
  }
  .exp-body strong { color: var(--red); }
  .exp-body .tip {
    margin-top: 0.7rem;
    padding: 0.5rem 0.8rem;
    background: rgba(201,150,12,0.08);
    border-left: 2px solid var(--gold);
    font-size: 0.82rem;
    color: var(--muted);
    border-radius: 0 2px 2px 0;
  }

  /* ACTIONS */
  .card-footer {
    padding: 1rem 1.8rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .exp-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.45rem 0.9rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    display: none;
  }
  .exp-toggle.show { display: inline-flex; align-items: center; gap: 0.4rem; }
  .exp-toggle:hover { border-color: var(--gold); color: var(--gold); }

  .next-btn {
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 0.55rem 1.4rem;
    font-size: 0.88rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    align-items: center;
    gap: 0.5rem;
    letter-spacing: 0.03em;
  }
  .next-btn.show { display: inline-flex; }
  .next-btn:hover { background: var(--red); }
  .next-btn svg { width:14px; height:14px; }

  /* RESULT SCREEN */
  .result-screen {
    display: none;
    text-align: center;
    padding: 3rem 1.5rem;
    animation: slideUp 0.5s cubic-bezier(.4,0,.2,1);
  }
  .result-screen.show { display: block; }
  .result-kanji {
    font-family: 'Shippori Mincho', serif;
    font-size: 5rem;
    font-weight: 800;
    color: var(--red);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .result-sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .result-score-big {
    font-family: 'Shippori Mincho', serif;
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
  }
  .result-score-big span { color: var(--red); }
  .result-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
  }
  .restart-btn {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 0.7rem 2rem;
    font-size: 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .restart-btn:hover { background: #a93226; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(192,57,43,0.3); }

  /* FEEDBACK TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: white;
    border-radius: 99px;
    padding: 0.6rem 1.4rem;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--green); }
  .toast.ng { background: var(--red); }
</style>
</head>
<body>

<header>
  <div class="header-badge">N4 JLPT • LUYỆN TẬP</div>
  <h1>日本語<span>クイズ</span></h1>
  <p class="sub">Trắc nghiệm tiếng Nhật · Tra từ vựng · Giải thích chi tiết</p>
</header>

<!-- Progress -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span class="progress-text" id="progressText">1 / 6</span>
  <span class="score-badge" id="scoreBadge">0 điểm</span>
</div>

<main>
  <!-- Quiz card -->
  <div class="quiz-card" id="quizCard">
    <!-- Question header -->
    <div class="q-header">
      <span class="q-num" id="qNum">Q1</span>
      <div class="q-body">
        <span class="q-tag" id="qTag">từ vựng</span>
        <div class="q-text" id="qText"></div>
      </div>
    </div>

    <!-- Vocab strip -->
    <div class="vocab-strip" id="vocabStrip">
      <span class="vocab-label">🔍 TRA TỪ:</span>
    </div>

    <!-- Choices -->
    <div class="choices" id="choices"></div>

    <!-- Explanation -->
    <div class="explanation" id="explanation">
      <div class="exp-head">· GIẢI THÍCH ·</div>
      <div class="exp-body" id="expBody"></div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <button class="exp-toggle" id="expToggle" onclick="toggleExp()">
        📖 Xem giải thích
      </button>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        Câu tiếp theo
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Result screen -->
  <div class="result-screen" id="resultScreen">
    <div class="result-kanji" id="resultKanji">合格</div>
    <div class="result-title" id="resultTitle">Xuất sắc!</div>
    <div class="result-sub" id="resultSub">Bạn đã hoàn thành bài trắc nghiệm</div>
    <div class="result-score-big" id="resultScore">0<span>/6</span></div>
    <div class="result-label">SỐ CÂU ĐÚNG</div>
    <button class="restart-btn" onclick="restart()">🔄 Làm lại từ đầu</button>
  </div>
</main>

<!-- Vocab popup -->
<div class="vocab-popup" id="vocabPopup" onclick="closeVocab(event)">
  <div class="vocab-popup-box">
    <div class="vp-top">
      <div>
        <div class="vp-word" id="vpWord"></div>
        <div class="vp-reading" id="vpReading"></div>
      </div>
      <button class="vp-close" onclick="closeVocabBtn()">✕</button>
    </div>
    <div class="vp-body">
      <div class="vp-type" id="vpType"></div>
      <div class="vp-meaning" id="vpMeaning"></div>
      <div class="vp-example" id="vpExample"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const QUESTIONS = [
  {
    tag: "TỪ VỰNG • N4",
    text: "毎朝、私は６時に___。",
    vocab: [
      { word: "毎朝", reading: "まいあさ", type: "Danh từ", meaning: "Mỗi buổi sáng", example: "毎朝６時に起きます。\n(Mỗi sáng tôi dậy lúc 6 giờ.)" },
      { word: "起きます", reading: "おきます", type: "Động từ nhóm 2", meaning: "Thức dậy, ngủ dậy", example: "何時に起きますか？\n(Bạn dậy lúc mấy giờ?)" },
    ],
    choices: ["寝ます", "起きます", "食べます", "飲みます"],
    answer: 1,
    explanation: `Câu hỏi về thói quen buổi sáng. Động từ <strong>起きます（おきます）</strong> nghĩa là "thức dậy". Các đáp án khác: 寝ます (ngủ), 食べます (ăn), 飲みます (uống) đều không hợp nghĩa với ngữ cảnh "buổi sáng lúc 6 giờ".<div class="tip">💡 Mẫu câu: 毎朝〜時に〜ます → mỗi sáng lúc ... giờ làm gì</div>`,
  },
  {
    tag: "NGỮ PHÁP • N4",
    text: "日本語が話せる___、友達をたくさん作りたい。",
    vocab: [
      { word: "話せる", reading: "はなせる", type: "Động từ thể khả năng", meaning: "Có thể nói", example: "日本語が話せますか？\n(Bạn có thể nói tiếng Nhật không?)" },
      { word: "作る", reading: "つくる", type: "Động từ nhóm 1", meaning: "Tạo ra, kết bạn", example: "友達を作る。\n(Kết bạn.)" },
    ],
    choices: ["ので", "のに", "でも", "から"],
    answer: 0,
    explanation: `<strong>ので</strong> (vì/do) dùng để nêu nguyên nhân một cách tự nhiên, lịch sự. Ở đây: "Vì có thể nói tiếng Nhật, tôi muốn kết bạn nhiều". <br><br>• <strong>から</strong> cũng nghĩa "vì" nhưng mang tính chủ quan hơn.<br>• <strong>のに</strong> thể hiện sự tương phản (dù... nhưng...) — không phù hợp.<br>• <strong>でも</strong> nghĩa "nhưng/tuy nhiên" — sai ngữ nghĩa.<div class="tip">💡 〜ので → nguyên nhân khách quan, lịch sự | 〜から → nguyên nhân chủ quan</div>`,
  },
  {
    tag: "ĐỌC HIỂU • N4",
    text: "この映画は___おもしろくないです。あまり好きじゃない。",
    vocab: [
      { word: "映画", reading: "えいが", type: "Danh từ", meaning: "Phim, bộ phim", example: "映画を見ます。\n(Xem phim.)" },
      { word: "あまり", reading: "あまり", type: "Trạng từ", meaning: "Không... lắm (dùng với phủ định)", example: "あまり好きじゃない。\n(Không thích lắm.)" },
    ],
    choices: ["とても", "ちょっと", "もっと", "ぜんぜん"],
    answer: 1,
    explanation: `Câu dùng thể phủ định nhẹ. <strong>ちょっと</strong> (hơi/một chút) kết hợp với phủ định tạo ra cách nói lịch sự, giảm nhẹ: "Phim này hơi không hay".<br><br>• <strong>とても</strong> (rất) → cần câu khẳng định.<br>• <strong>もっと</strong> (nhiều hơn) → không hợp ngữ cảnh.<br>• <strong>ぜんぜん</strong> (hoàn toàn không) → mức phủ định mạnh, nhưng câu tiếp theo "あまり" đã là phủ định nhẹ.<div class="tip">💡 ちょっと + phủ định = hơi không... (cách nói lịch sự, tế nhị)</div>`,
  },
  {
    tag: "HÌNH THỨC LỊCH SỰ • N4",
    text: "先生に___いただきました。",
    vocab: [
      { word: "先生", reading: "せんせい", type: "Danh từ", meaning: "Giáo viên, thầy/cô", example: "先生に習います。\n(Học từ thầy/cô.)" },
      { word: "いただく", reading: "いただく", type: "Kính ngữ (謙譲語)", meaning: "Nhận được (khiêm tốn)", example: "プレゼントをいただきました。\n(Tôi đã nhận được quà.)" },
    ],
    choices: ["教えてあげて", "教えてもらって", "教えてくれて", "教えてやって"],
    answer: 1,
    explanation: `Cấu trúc <strong>〜ていただく</strong> là dạng kính ngữ khiêm tốn (謙譲語) của <strong>〜てもらう</strong>. Vì chủ thể là 先生 (người trên), ta phải dùng hình thức tôn kính.<br><br>• <strong>〜てもらう</strong>: nhận được sự giúp đỡ (bình thường)<br>• <strong>〜ていただく</strong>: nhận được sự giúp đỡ từ người trên (kính ngữ)<br>• <strong>〜てくれる</strong>: ai đó làm cho mình (không dùng với 先生)<div class="tip">💡 先生・上司 → ていただく | 友達・後輩 → てもらう・てくれる</div>`,
  },
  {
    tag: "TỪ VỰNG • N4",
    text: "財布を___しまいました。",
    vocab: [
      { word: "財布", reading: "さいふ", type: "Danh từ", meaning: "Ví tiền, bóp tiền", example: "財布を忘れた。\n(Quên ví rồi.)" },
      { word: "しまう", reading: "しまう", type: "Động từ bổ trợ", meaning: "Lỡ làm gì (ngoài ý muốn)", example: "食べてしまいました。\n(Đã ăn mất rồi.)" },
    ],
    choices: ["忘れて", "なくして", "おいて", "もって"],
    answer: 1,
    explanation: `<strong>なくして</strong> từ động từ <strong>なくす</strong> nghĩa là "làm mất". Kết hợp với <strong>〜てしまいました</strong> → "đã lỡ đánh mất ví".<br><br>• <strong>忘れる</strong>: quên (để lại đâu đó) — khác với mất hẳn<br>• <strong>おく</strong>: để, cất (chuẩn bị trước) — sai nghĩa<br>• <strong>もつ</strong>: cầm/giữ — không phù hợp<div class="tip">💡 なくす = làm mất hẳn | 忘れる = quên (biết chỗ nhưng không mang theo)</div>`,

    text: "もっと早く___ば、電車に乗れたのに。",
    vocab: [
      { word: "早く", reading: "はやく", type: "Trạng từ", meaning: "Sớm hơn, nhanh hơn", example: "早く起きてください。\n(Xin hãy dậy sớm.)" },
      { word: "乗れる", reading: "のれる", type: "Thể khả năng", meaning: "Có thể lên (tàu/xe)", example: "電車に乗れますか？\n(Bạn có thể lên tàu không?)" },

    choices: ["来れ", "来た", "来る", "来たら"],
    answer: 0,
    explanation: `Đây là cấu trúc điều kiện <strong>〜ば〜のに</strong> diễn tả sự tiếc nuối về điều không xảy ra. Động từ 来る (đến) chia thể ば là <strong>来れば（くれば）</strong>.<br><br>Cách chia thể ば: bỏ う → thêm えば<br>• 来る → 来れば ✓<br>• 書く → 書けば<br>• 食べる → 食べれば<div class="tip">💡 〜ば〜のに = "Giá mà...thì đã..." (tiếc nuối điều đã không xảy ra)</div>`,

let current = 0;
let score = 0;
let answered = false;
let expVisible = false;

const LETTERS = ['A','B','C','D'];

function renderQuestion() {
  const q = QUESTIONS[current];
  answered = false;
  expVisible = false;

  // Progress
  document.getElementById('progressFill').style.width = (current / QUESTIONS.length * 100) + '%';
  document.getElementById('progressText').textContent = `${current+1} / ${QUESTIONS.length}`;
  document.getElementById('scoreBadge').textContent = score + ' điểm';

  document.getElementById('qNum').textContent = `Q${current+1}`;
  document.getElementById('qTag').textContent = q.tag;
  document.getElementById('qText').textContent = q.text;

  // Vocab
  const strip = document.getElementById('vocabStrip');
  strip.innerHTML = '<span class="vocab-label">🔍 TRA TỪ:</span>';
  q.vocab.forEach((v, i) => {
    const chip = document.createElement('button');
    chip.className = 'vocab-chip';
    chip.textContent = v.word;
    chip.onclick = () => showVocab(i);
    strip.appendChild(chip);
  });

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${LETTERS[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  // Reset
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('expToggle').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('expBody').innerHTML = q.explanation;

  // Animate card
  const card = document.getElementById('quizCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.4s cubic-bezier(.4,0,.2,1)';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  const btns = document.querySelectorAll('.choice-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    if (i === idx && idx !== q.answer) btn.classList.add('wrong');
  });

  if (idx === q.answer) {
    score++;
    showToast('✓ Chính xác!', 'ok');
  } else {
    showToast('✗ Sai rồi!', 'ng');
  }

  document.getElementById('expToggle').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  if (current === QUESTIONS.length - 1) {
    document.getElementById('nextBtn').innerHTML = `Xem kết quả <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>`;
  }
}

function toggleExp() {
  expVisible = !expVisible;
  const exp = document.getElementById('explanation');
  const btn = document.getElementById('expToggle');
  if (expVisible) {
    exp.classList.add('show');
    btn.textContent = '📕 Ẩn giải thích';
  } else {
    exp.classList.remove('show');
    btn.textContent = '📖 Xem giải thích';
  }
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';

  const pct = score / QUESTIONS.length;
  let kanji = '合格', title = 'Xuất sắc!', sub = 'Bạn thật sự giỏi tiếng Nhật!';
  if (pct < 0.5) { kanji = '不合格'; title = 'Cần cố gắng thêm'; sub = 'Hãy ôn luyện lại nhé!'; }
  else if (pct < 0.8) { kanji = '合格'; title = 'Khá tốt!'; sub = 'Tiếp tục luyện tập nhé!'; }

  document.getElementById('resultKanji').textContent = kanji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultScore').innerHTML = `${score}<span>/${QUESTIONS.length}</span>`;

  document.getElementById('resultScreen').classList.add('show');
}

function restart() {
  current = 0; score = 0; answered = false; expVisible = false;
  document.getElementById('quizCard').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('nextBtn').innerHTML = `Câu tiếp theo <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>`;
  renderQuestion();
}

// Vocab popup
function showVocab(idx) {
  const v = QUESTIONS[current].vocab[idx];
  document.getElementById('vpWord').textContent = v.word;
  document.getElementById('vpReading').textContent = v.reading;
  document.getElementById('vpType').textContent = v.type;
  document.getElementById('vpMeaning').textContent = v.meaning;
  const lines = v.example.split('\n');
  document.getElementById('vpExample').innerHTML = lines[0] + (lines[1] ? `<em>${lines[1]}</em>` : '');
  document.getElementById('vocabPopup').classList.add('open');
}
function closeVocab(e) {
  if (e.target === document.getElementById('vocabPopup'))
    document.getElementById('vocabPopup').classList.remove('open');
}
function closeVocabBtn() {
  document.getElementById('vocabPopup').classList.remove('open');
}

// Toast
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
renderQuestion();
</script>
