  },
  {

  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "直子は七歳のときに家出したが、聡明な______、見つかることなく十日間もひとりで生きていた。",

    ],
    choices: ["だけあって", "だけに", "だけ", "だけは"],
    answer: 0,
    explanation: `Cấu trúc <strong>～だけあって</strong> nghĩa là \"đúng như..., xứng đáng với..., không hổ danh là...\". Dùng khi kết quả tương xứng hoàn toàn với phẩm chất/danh tiếng. Ở đây: \"Đúng như một đứa thông minh, suốt 10 ngày một mình mà không bị phát hiện\".<br><br>• <strong>だけに</strong>: \"chính vì thế nên...\" — dùng khi nhấn mạnh lý do, hàm ý kết quả có thể tốt hoặc xấu, không nhất thiết tương xứng với phẩm chất.<br>• <strong>だけ</strong>: \"chỉ...thôi\" — không hợp cú pháp ở đây.<br>• <strong>だけは</strong>: \"ít nhất...\" — sai nghĩa hoàn toàn.<div class="tip">💡 ～だけあって = không hổ danh là..., đúng như kỳ vọng (kết quả tương xứng với phẩm chất tích cực)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "技術が進歩してなにかが新しくできるようになると、それを______のです。",
    vocab: [
      { word: "技術", reading: "ぎじゅつ", type: "Danh từ", meaning: "Kỹ thuật, công nghệ", example: "技術が進歩する。\n(Kỹ thuật tiến bộ.)" },
      { word: "進歩", reading: "しんぽ", type: "Danh từ・Suru động từ", meaning: "Tiến bộ, phát triển", example: "医学の進歩は著しい。\n(Sự tiến bộ của y học rất đáng kể.)" },
    ],
    choices: ["使ってみたくてならない", "使ってみたくてたまらない", "使ってみたくてしょうがない", "使ってみたくて当然"],
    answer: 1,
    explanation: `Cấu trúc <strong>～てたまらない</strong> nghĩa là \"...quá, không chịu được, muốn... đến mức không kìm được\". Ở đây: \"Cứ hễ có cái gì mới ra thì không thể không thử dùng ngay\".<br><br>• <strong>ならない</strong>: ～てならない cũng có nghĩa tương tự nhưng thường dùng với cảm xúc/trạng thái tự phát (悲しくてならない), ít dùng với ý muốn chủ động (たい).<br>• <strong>しょうがない</strong>: ～てしょうがない cũng đúng ngữ pháp, nhưng たまらない tự nhiên hơn khi diễn tả ham muốn thử trải nghiệm điều mới.<br>• <strong>当然</strong>: \"là lẽ đương nhiên\" — không phải mẫu ngữ pháp cho cảm xúc mạnh.<div class="tip">💡 ～たくてたまらない = muốn...đến mức không thể kìm nén (ham muốn mãnh liệt)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "周りがうるさくしゃべる______、なにか考えようにも気が散ってしまう。",

      { word: "気が散る", reading: "きがちる", type: "Cụm động từ", meaning: "Mất tập trung, xao nhãng", example: "騒音で気が散る。\n(Mất tập trung vì tiếng ồn.)" },
      { word: "周り", reading: "まわり", type: "Danh từ", meaning: "Xung quanh", example: "周りをよく見る。\n(Quan sát xung quanh kỹ.)" },

    choices: ["ものの", "ものがある", "ものだから", "ものか"],

  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "今のロンドンの成長率______、この先の二十年で彼の資産価値は十倍以上にふくらむだろう。",
    vocab: [
      { word: "成長率", reading: "せいちょうりつ", type: "Danh từ", meaning: "Tốc độ tăng trưởng", example: "高い成長率を維持する。\n(Duy trì tốc độ tăng trưởng cao.)" },
      { word: "資産価値", reading: "しさんかち", type: "Danh từ", meaning: "Giá trị tài sản", example: "資産価値が上がる。\n(Giá trị tài sản tăng lên.)" },
      { word: "ふくらむ", reading: "ふくらむ", type: "Động từ nhóm 1", meaning: "Phồng lên, nở ra, tăng lên (về số lượng)", example: "借金がふくらむ。\n(Nợ ngày càng phình to.)" },

    choices: ["からこそ", "からには", "からして", "からすれば"],

    explanation: `Cấu trúc <strong>～からすれば</strong> nghĩa là \"nhìn từ góc độ..., xét theo..., dựa vào...mà phán đoán\". Ở đây: \"Nhìn vào tốc độ tăng trưởng hiện tại của London, tài sản của anh ta trong 20 năm tới sẽ tăng hơn 10 lần\".<br><br>• <strong>からこそ</strong>: \"chính vì...nên...\" — nhấn mạnh nguyên nhân, không phải phán đoán.<br>• <strong>からには</strong>: \"đã...thì phải...\" — diễn tả trách nhiệm/quyết tâm, sai ngữ cảnh.<br>• <strong>からして</strong>: \"ngay từ..., xét từ điểm...\" — dùng để đánh giá từ một dấu hiệu cụ thể, không phù hợp bằng からすれば.<div class="tip">💡 ～からすれば = nhìn từ góc độ..., xét theo... (dùng để đưa ra phán đoán/nhận xét)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "私はサプライズギフトが大好きで、開けてみずには______。",
    vocab: [

      { word: "開ける", reading: "あける", type: "Động từ nhóm 2", meaning: "Mở ra", example: "プレゼントを開ける。\n(Mở quà ra.)" },
    ],
    choices: ["いられない", "なりえない", "おわらない", "とまらまい"],
    answer: 0,
    explanation: `Cấu trúc <strong>～ずにはいられない</strong> nghĩa là \"không thể không..., không nhịn được mà không...\". Ở đây: 開けてみる → thể ず: 開けてみず + にはいられない → \"Không thể không thử mở (quà surprise)\".<br><br>Lưu ý: する → せず (bất quy tắc); các động từ khác: Vない形 bỏ ない + ず (ví dụ: 見る→見ず、食べる→食べず、開ける→開けず).<br><br>• <strong>なりえない</strong>: \"không thể trở thành\" — sai nghĩa hoàn toàn.<br>• <strong>おわらない</strong>: \"không kết thúc\" — sai nghĩa.<br>• <strong>とまらまい</strong>: không phải mẫu ngữ pháp chuẩn.<div class="tip">💡 ～ずにはいられない = không nhịn được, không thể không làm (bản năng/xung động mạnh)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "山本はスライドを示しながら、３０分______本社のデザインについて説明した。",

      { word: "デザイン", reading: "でざいん", type: "Danh từ・Suru động từ", meaning: "Thiết kế, kiểu dáng", example: "新しいデザインを提案する。\n(Đề xuất thiết kế mới.)" },

    choices: ["において", "にそって", "につけ", "にわたって"],

    explanation: `Cấu trúc <strong>～にわたって</strong> nghĩa là \"trong suốt, kéo dài..., trải qua...\" (diễn tả phạm vi thời gian hoặc không gian). Ở đây: \"Yamamoto giải thích về thiết kế trụ sở trong suốt 30 phút\".<br><br>• <strong>において</strong>: \"tại, ở, trong lĩnh vực\" — chỉ địa điểm/phạm vi, không chỉ khoảng thời gian.<br>• <strong>にそって</strong>: \"theo, dọc theo\" — chỉ sự tuân theo hoặc đi dọc theo.<br>• <strong>につけ</strong>: \"mỗi khi, dù thế nào\" — sai hoàn toàn ngữ cảnh.<div class="tip">💡 ～にわたって = trong suốt, kéo dài (dùng với thời gian: ３時間にわたって, hoặc phạm vi: 全国にわたって)</div>`,

    tag: "NGỮ PHÁP • N2",
    text: "どんな人か、実際会ってみないことには、______。",
    vocab: [
      { word: "実際", reading: "じっさい", type: "Danh từ・Trạng từ", meaning: "Thực tế, thực sự", example: "実際に試してみる。\n(Thực sự thử xem.)" },

    choices: ["だいたいわかるだろう", "わかるはずだ", "わからなければならない", "よくわからない"],
    answer: 3,
    explanation: `Cấu trúc <strong>～ないことには～ない</strong> nghĩa là \"nếu không làm X thì không thể Y\". Đây là mẫu cố định: Vないことには + kết quả phủ định. Ở đây: \"Nếu không thực sự gặp mặt thì không thể biết rõ người đó như thế nào\".<br><br>Lưu ý quan trọng: vế sau <strong>bắt buộc phải là phủ định</strong> (không, chưa, khó).<br><br>• <strong>だいたいわかるだろう</strong>: \"chắc là hiểu đại khái\" — khẳng định, sai cấu trúc.<br>• <strong>わかるはずだ</strong>: \"đáng lẽ phải hiểu\" — khẳng định, sai cấu trúc.<br>• <strong>わからなければならない</strong>: \"phải hiểu\" — không hợp nghĩa.<div class="tip">💡 ～ないことには～ない = nếu không làm X thì không thể Y (điều kiện tiên quyết)</div>`,
  },
  ],
