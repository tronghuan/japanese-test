<script>
var QUIZ_CONFIG = {

  questions: [
  {

　この書き方でいいのかな。<br>
　これ、ひどく下手な書き方じゃないだろうか。<br>
　これでわかるかな。<br><br>

しかし、その逆もまた真である。文章を書く面白さとは、そういうプレッシャーを感じながら、なんとか諸問題をクリアして、一応のものを書き上げることにあるのだ。テレビゲームが楽しいのと同じ理屈<span class="reading-note">（注2: 考え方）</span>である。あれは、攻略する<span class="reading-note">（注3: うまく解決する）</span>のが簡単ではない様々な障害をかわしながら<span class="reading-note">（注4: 避けながら）</span>、次々に問題を解決していって、なんとかクリアしていくところが面白いのである。むずかしいからこそ、うまくやったときに楽しいのだ。<br><br>
文章を書くのも、<strong>（１）そういうこと</strong>である。これでいいのかな、と一抹の<span class="reading-note">（注5: ほんの少しの）</span>不安を抱えながら、なんとか書いていくってことを楽しまなければならない。<br><br>
別の言い方にすると、文章というものは、書く人に対して、うまく書いてくれ、と要求してくるのである。なぜなら、文章とは人と人とのコミュニケーションの道具だからだ。この例外は、自分だけにわかればいいメモと、絶対に他人に見せない日記だけである。それ以外の文章は、必ず、書く人間のほかに、<strong>（２）読む人間がいて完成される</strong>のだ。そして、書いた人の伝えたかったことが、読んだ人にちゃんとわかってこそ、文章は役をはたしたことになる。

<div class="reading-question">問1：筆者は、文章を書くときに何が<strong>プレッシャーになっている</strong>と述べているか。</div>`,

    explanation: `<strong>正解：②</strong> 読む人が期待する書き方をしているかという気持ち<br><br>
筆者が書きながら感じるプレッシャーの内容として挙げているのは「この書き方でいいのかな」「ひどく下手な書き方じゃないだろうか」「これでわかるかな」という気持ちです。<br>これらは表面的には「うまく書けているか」の不安ですが、筆者は後段で「文章とは人と人とのコミュニケーションの道具だから、うまく書いてくれと要求してくる」と述べており、<strong>読み手の視点から書けているかどうか</strong>が根本的なプレッシャーだとわかります。<br><br>
• ①「最後まで書き上げられるか」：本文に該当する記述なし。<br>
• ③「字を書くのが下手」：「書き方が下手」の話であり「字」の話ではない。<br>

<span class="passage-label">📄 ĐOẠN VĂN 1 — Câu 1～3（該当箇所）</span>
文章を書く面白さとは、そういうプレッシャーを感じながら、なんとか諸問題をクリアして、一応のものを<strong>書き上げることにある</strong>のだ。テレビゲームが楽しいのと同じ理屈である。あれは、攻略するのが簡単ではない様々な障害をかわしながら、次々に問題を解決していって、なんとかクリアしていくところが面白いのである。<strong>むずかしいからこそ、うまくやったときに楽しいのだ。</strong><br><br>
文章を書くのも、<strong>（１）そういうことである。</strong>これでいいのかな、と一抹の不安を抱えながら、なんとか書いていくってことを楽しまなければならない。
</div>
<div class="reading-question">問2：<strong>（１）そういうことである</strong>とはどういうことか。</div>`,

      { word: "諸問題", reading: "しょもんだい", type: "Danh từ", meaning: "Nhiều vấn đề, các vấn đề", example: "諸問題を解決する。\n(Giải quyết các vấn đề.)" },
      { word: "一応", reading: "いちおう", type: "Phó từ", meaning: "Tạm thời, đại khái, dù sao cũng", example: "一応確認しておく。\n(Tạm thời xác nhận trước.)" },

    ],
    choices: [
      "様々な障害をクリアしていくことがむずかしい。",
      "プレッシャーを忘れ、いろいろ考えるのが楽しい。",
      "苦労して問題を片付け、課題を仕上げるのが楽しい。",
      "不安を抱えたままでは問題を解決するのがむずかしい。"
    ],
    answer: 2,
    explanation: `<strong>正解：③</strong> 苦労して問題を片付け、課題を仕上げるのが楽しい。<br><br>
「そういうこと」は直前の内容を指します。テレビゲームの比喩で「障害をかわしながら問題を解決し、なんとかクリアしていくのが面白い」「むずかしいからこそ、うまくやったときに楽しい」とあります。<br>文章を書くことも同様に、<strong>プレッシャーや不安（苦労）を抱えながら問題を解決し、書き上げる（仕上げる）ことが楽しい</strong>ということです。<br><br>
• ①「むずかしい」：テレビゲームの例で「むずかしい」とは述べているが、それ自体が楽しいとは言っていない。<br>
• ②「プレッシャーを忘れ」：本文ではプレッシャーを感じながら楽しむと述べており、忘れるとは述べていない。<br>
• ④「解決するのがむずかしい」：むずかしい＝楽しいという文脈であり、否定的な意味ではない。<div class="tip">💡 「そういうこと」は直前の内容の言い換え → テレビゲームの比喩（苦労してクリア＝楽しい）を文章執筆に当てはめた内容</div>`,
  },
  {
    tag: "ĐỌC HIỂU • N2 • Đoạn 1",
    text: `<div class="reading-passage">
<span class="passage-label">📄 ĐOẠN VĂN 1 — Câu 1～3（該当箇所）</span>
別の言い方にすると、文章というものは、書く人に対して、<strong>うまく書いてくれ、と要求してくる</strong>のである。なぜなら、文章とは人と人とのコミュニケーションの道具だからだ。この例外は、自分だけにわかればいいメモと、絶対に他人に見せない日記だけである。<br><br>
それ以外の文章は、必ず、書く人間のほかに、<strong>（２）読む人間がいて完成されるのだ。</strong>そして、書いた人の伝えたかったことが、読んだ人にちゃんとわかってこそ、文章は役をはたしたことになる。

    ],
    choices: [
      "文章の価値を決めるのは読み手の存在だ。",
      "文章が成立するには読み手の存在が必要だ。",
      "文章は人に読まれることでよりよいものになる。",
      "文章は読み手の要求にこたえることでできあがる。"
    ],
    answer: 3,
    explanation: `<strong>正解：④</strong> 文章は読み手の要求にこたえることでできあがる。<br><br>
「読む人間がいて完成される」の意味は、直前の「文章というものは、書く人に対して、うまく書いてくれ、と<strong>要求してくる</strong>」という記述と、直後の「書いた人の伝えたかったことが、読んだ人にちゃんとわかってこそ、文章は役をはたしたことになる」から読み解けます。<br>つまり、文章は読み手の要求（うまく伝わること）にこたえることで初めて完成・役割を果たすということです。<br><br>
• ①「文章の価値を決めるのは読み手」：本文は価値の話ではなく、完成の条件の話。<br>
• ②「読み手の存在が必要」：一部正しいが、存在するだけでなく「伝わること」が条件。<br>
• ③「よりよいものになる」：本文の主張は「よりよくなる」ではなく「完成する/役をはたす」。<div class="tip">💡 「～てこそ～になる」→ ～して初めて～という条件を示す表現。「読んだ人にわかってこそ役をはたす」に注目</div>`,
  },
  {
    tag: "ĐỌC HIỂU • N2 • Đoạn 2",
    text: `<div class="reading-passage">
<span class="passage-label">📄 ĐOẠN VĂN 2 — Câu 4</span>
大手ハンバーガー店が今月１６日から３０日まで、<strong>新商品がまずかったら全額返金する</strong>というキャンペーン<span class="reading-note">（注: 販売方法）</span>を実施する。通信販売などでは、注文した商品が気に入らなければその代金を客に返金するという保証制度は一般的だが、ハンバーガー店のような外食産業では非常に珍しい試みだ。味への自信を示すことが目的で、全国で一斉に行われる。<strong>返金は当日限りで、期間中１人１回のみ、それから商品を半分以上食べていないことが条件だ。</strong>

    vocab: [

      { word: "条件", reading: "じょうけん", type: "Danh từ", meaning: "Điều kiện", example: "条件を満たす。\n(Đáp ứng điều kiện.)" },
    ],
    choices: [
      "新商品がまずければいつでも全額返金する。",
      "どの商品でもまずければ条件つきで全額返金する。",

    explanation: `<strong>正解：③</strong> 新商品の味が気に入らなければ条件つきで全額返金する。<br><br>

• ①「いつでも」：当日限り・期間中1回のみという条件があるので誤り。<br>

• ④「どの商品でも」：対象が新商品に限定されているので誤り。<div class="tip">💡 選択肢の「いつでも」「どの商品でも」「新商品」「条件つき」という細部に注目して本文と照合する</div>`,

• ①「人間の持つ嫌なにおいを防ぐ」：本文にあるのは「落ち葉や枯れ木が腐ったときに生じる嫌なにおいを消す」であり、人間のにおいの話ではない。<br>
• ③「落ち葉や枯れ木を腐りにくくする」：本文では「腐ったときのにおいを消す」とあり、腐ること自体を防ぐとは述べていない。<br>
• ④「木々がもともと持っているにおいを消す」：逆。その物質は木々が作り出す香り（森の香り）の原因であり、消すのは「嫌なにおい」。<div class="tip">💡 「神経を安定させる」＝「気持ちを落ち着かせる」の言い換えに気づくことが鍵</div>`,
