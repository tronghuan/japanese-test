    tag: "NGỮ PHÁP • N2",
    text: "私、どこか遠くへ行きたい。あの人を思い出す誰かと _______　ところへ行きたい。",

    ],
    choices: ["会わないですむ", "会わなくてすんだ", "会わずにすんだ", "会わずにすむ"],
    answer: 3,
    explanation: `Cấu trúc <strong>Vずに済む</strong> nghĩa là \"không cần phải V, không phải V vẫn ổn\". Đây là ước muốn về tương lai nên dùng thể hiện tại (済む), không phải quá khứ. Ở đây: \"Tôi muốn đến một nơi nào đó xa xôi, nơi không cần gặp bất kỳ ai gợi nhớ đến người đó\".<br><br>• <strong>会わないですむ</strong>: ngữ pháp không chuẩn — ずに/ないで + 済む thì phải dùng ずに (文語的 hơn) hoặc なくて, không dùng ないで + 済む.<br>• <strong>会わなくてすんだ</strong>: thể quá khứ (すんだ) — câu đang diễn tả ước muốn về tương lai, không phù hợp.<br>• <strong>会わずにすんだ</strong>: thể quá khứ — cũng không phù hợp với ngữ cảnh ước muốn hiện tại/tương lai.<div class="tip">💡 Vずに済む = không cần phải V vẫn ổn (ước muốn thoát khỏi tình huống không muốn gặp)</div>`,
  },
  {

      { word: "生活上", reading: "せいかつじょう", type: "Danh từ", meaning: "Về mặt cuộc sống, trong sinh hoạt", example: "生活上の不便を感じる。\n(Cảm thấy bất tiện trong cuộc sống.)" },
    ],

    answer: 1,
    explanation: `Cấu trúc <strong>N + 上（じょう）</strong> nghĩa là \"về mặt..., xét về phương diện..., trong lĩnh vực...\". Ở đây: \"Hãy cùng xem xét một số vấn đề về mặt cuộc sống kéo theo từ điều đó\".<br><br>• <strong>際（さい）</strong>: \"lúc, nhân dịp\" — diễn tả thời điểm, không phù hợp (生活際 không tự nhiên).<br>• <strong>以上（いじょう）</strong>: \"hơn, từ trở lên; đã thế thì\" — không tạo nghĩa phù hợp với 生活.<br>• <strong>反面（はんめん）</strong>: \"mặt khác, ngược lại\" — diễn tả hai mặt đối lập, không phù hợp ngữ cảnh.<div class="tip">💡 N + 上（じょう）= về mặt..., xét về... (健康上、法律上、生活上、仕事上)</div>`,

  },

    vocab: [
      { word: "バス停", reading: "バスてい", type: "Danh từ", meaning: "Trạm xe buýt, điểm dừng xe buýt", example: "バス停で待つ。\n(Chờ ở trạm xe buýt.)" },
      { word: "満員", reading: "まんいん", type: "Danh từ・Tính từ -na", meaning: "Đầy người, hết chỗ, kín chỗ", example: "電車が満員だ。\n(Tàu điện đầy người.)" },
      { word: "結局", reading: "けっきょく", type: "Phó từ", meaning: "Cuối cùng, rốt cuộc, kết cục", example: "結局、諦めてしまった。\n(Cuối cùng đành bỏ cuộc.)" },
      { word: "間に合う", reading: "まにあう", type: "Động từ nhóm 1", meaning: "Kịp, đến kịp, đủ dùng", example: "授業に間に合った。\n(Kịp giờ học.)" },

    choices: ["乗っている途中だった", "乗ったところだ", "乗っているつもりだった", "乗ろうとした"],
    answer: 3,
    explanation: `Cấu trúc <strong>Vよう + とした</strong> nghĩa là \"đã cố/toan làm V, đang định V thì...\". Diễn tả hành động sắp xảy ra hoặc đang cố thực hiện nhưng bị ngắt/thất bại. Ở đây: \"Tôi toan lên xe buýt nhưng đầy người không lên được, kết quả là không kịp máy bay\".<br><br>• <strong>乗っている途中だった</strong>: \"đang trên đường đi (trong lúc đi)\" — hàm ý đã lên xe rồi, không hợp vì sau đó nói 乗れず (không lên được).<br>• <strong>乗ったところだ</strong>: \"vừa mới lên\" — hàm ý đã lên xe thành công, mâu thuẫn với 乗れず.<br>• <strong>乗っているつもりだった</strong>: \"đã có ý định đang đi\" — cấu trúc kỳ lạ, không tự nhiên.<div class="tip">💡 Vよう + とした = toan/định V (nhưng chưa hoặc không thực hiện được — thường hàm ý bị ngăn cản)</div>`,

    vocab: [
      { word: "事業計画", reading: "じぎょうけいかく", type: "Danh từ", meaning: "Kế hoạch kinh doanh, dự án kinh doanh", example: "事業計画を立てる。\n(Lập kế hoạch kinh doanh.)" },
      { word: "投資", reading: "とうし", type: "Danh từ・Suru động từ", meaning: "Đầu tư", example: "株に投資する。\n(Đầu tư vào cổ phiếu.)" },
      { word: "タダ", reading: "タダ", type: "Danh từ・Tính từ -na", meaning: "Miễn phí, không tốn tiền", example: "タダでもらった。\n(Được cho không mất tiền.)" },
    ],
    choices: ["としても", "というと", "としたら", "といっても"],
    answer: 0,
    explanation: `Cấu trúc <strong>～としても</strong> nghĩa là \"dù cho (giả sử)..., dù có là...\". Diễn tả giả định một điều kiện để nêu kết quả vẫn không thay đổi. Ở đây: \"Dù cho không tạo ra được kế hoạch tốt thì tôi vẫn được dùng miễn phí lời tư vấn của tôi\".<br><br>• <strong>というと</strong>: \"nói đến..., khi nghe đến...\" — chuyển chủ đề hoặc giải thích, không phải giả định.<br>• <strong>としたら</strong>: \"nếu giả sử...\" — cũng là giả định nhưng thường hỏi về kết quả chưa biết, không nhấn mạnh \"dù sao đi nữa\" như としても.<br>• <strong>といっても</strong>: \"tuy nói là..., dù vậy\" — nhượng bộ, đính chính nhận định, sai nghĩa.<div class="tip">💡 ～としても = dù (giả sử) có là... (kết quả vẫn vậy — nhấn mạnh tính bất biến dù điều kiện thay đổi)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "実は私が戦争 _______　政治 _______　にはさっぱり感心がない。それは男たちがあつかう問題であって、女は関わったところで理解できやしないと思う。",
    vocab: [

      { word: "政治", reading: "せいじ", type: "Danh từ", meaning: "Chính trị", example: "政治に関心を持つ。\n(Quan tâm đến chính trị.)" },

    choices: ["とか/とか", "なり/なり", "やら/やら", "といい/といい"],

  },

    ],

    answer: 0,
    explanation: `Cấu trúc <strong>Vない + ではいられない</strong> nghĩa là \"không thể không V, không nhịn được mà không V\". Diễn tả cảm xúc/hành động tự nhiên, không cưỡng lại được. Ở đây: \"Chính bản thân cô ấy không thể không cảm thấy có điều gì đó áy náy trong lòng\".<br><br>• <strong>感じなくてはいられませんでした</strong>: cấu trúc なくてはいられない tuy tương tự nhưng thường mang nghĩa \"phải làm\" (bắt buộc), ít tự nhiên hơn trong ngữ cảnh cảm xúc không kiềm chế được.<br>• <strong>感じないといられませんでした</strong>: ないといられない — không phải cấu trúc chuẩn cho nghĩa này.<br>• <strong>感じなければいられませんでした</strong>: なければいられない — không phải cấu trúc chuẩn.<div class="tip">💡 Vない + ではいられない = không thể không V (cảm xúc/hành động bột phát, không kiềm chế được)</div>`,
  },
