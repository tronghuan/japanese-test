    choices: ["①", "②", "③", "④"],
    answer: 3,
    explanation: `<strong>正解：④ 自分の店を持つという夢が、とうとうかなった。</strong><br><br>
<strong>🔑 Giải thích:</strong><br>
・<strong>叶う（かなう）</strong> = ước mơ/nguyện vọng trở thành hiện thực → chủ ngữ là 夢・願い・望み ✓<br>
・④ 夢がかなった = ước mơ đã thành hiện thực → cách dùng chuẩn<br>
・① 苦労がかない → sai: "công lao được đền đáp" phải dùng 苦労が実る（みのる）/ 報われる<br>
・② 天気予報がかない → sai: "dự báo đúng" phải dùng 天気予報が当たった（あたった）<br>
・③ イベントがかなった → sai: "sự kiện diễn ra thành công" phải dùng 無事に行われた / 成功した<br>
→ かなう = <strong>ước mơ/nguyện vọng được thực hiện</strong> (夢が叶う・願いが叶う)`
