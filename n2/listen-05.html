・2006年：<strong>マイナス成長</strong>（0以下）✓<br>
・2007年：<strong>わずかな伸び</strong>（0より少し上、1.3%以下）✓<br>

男：やっぱり<u>田中電器の方が安い</u>ね。<br>
女：前あそこで洗濯機を買った時…<br>
男：<u>故障した時、なかなか修理に来なかった</u>んだ。<br>
女：<u>あそこは買った後のサービスがよくない</u>んだよね。<br>
女：鈴木電器は遠いけど、<u>なにかあるとすぐ来てくれる</u>よね。<br>
男：じゃ、鈴木電器にするか。<br><br>
<strong>🔑 Lý do chọn ②:</strong><br>

・男のところ → 女に返してもらっていない ✗<br>
・先生のところ → まだ返していない ✗<br>
・<strong>山田さんのところ</strong>（女が貸した）✓<br>
→ 選択肢①が正解`
  },
  {

    text: `<audio class="listen-audio" controls><source src="assets/listen-05/n2_1c_5.mp3" type="audio/mpeg"></audio><img class="listen-image" src="assets/listen-05/quiz5.gif" alt="Câu hỏi 5">`,
    vocab: [

女：どんなタイプの人がはやく偉くなるかっていう法則を発見したの。<br>
男：教えてよ。<br>
女：<u>その時必要な書類がすぐに出せる人</u>よ。<br>
男：そんなの当たり前じゃないか。<br>
女：偉くなる人は<u>机の上がものすごく散らかってる</u>の。<u>なのにぱっと出てくる</u>んよね。<u>すべてのことが頭の中で整理されてる</u>んだろうな。<br><br>

・机も頭も整理 → 机は散らかっている ✗<br>
