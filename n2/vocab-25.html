・<strong>作法（さほう）</strong> = phép tắc, lễ nghi → không liên quan đến nông nghiệp<br>
・<strong>食料（しょくりょう）</strong> = lương thực dự trữ → không dùng khi nói về cây đang trồng trên đồng<br>
