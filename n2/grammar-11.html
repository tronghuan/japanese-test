    answer: 0,
    explanation: `Cấu trúc <strong>～とか</strong> dùng để liệt kê ví dụ một cách mơ hồ, hàm ý "kiểu như..., chẳng hạn như...". Ở đây: "Gần đây anh ấy nói kiểu như 'Tôi sẽ nghỉ công ty rồi sống bằng cổ phiếu hay gì đó'". Câu này là lời dẫn trực tiếp mang tính không chắc chắn.<br><br>• <strong>もの</strong>: diễn tả lý do, cảm thán hoặc sự thật hiển nhiên — không hợp ngữ cảnh.<br>• <strong>こと</strong>: biến mệnh đề thành danh từ hóa — không tạo nghĩa "kiểu như".<br>• <strong>うえ</strong>: "hơn nữa, thêm vào đó" (～うえに) hoặc "trên cơ sở" (～たうえで) — đều sai ngữ cảnh.<div class="tip">💡 ～とか = kiểu như..., chẳng hạn... (liệt kê ví dụ mơ hồ, dùng trong văn nói)</div>`,

  },

  },
