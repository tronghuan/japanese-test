    answer: 2,
    explanation: `Cấu trúc <strong>～てはならない</strong> nghĩa là \"không được..., cấm...\" (lệnh cấm mang tính cứng rắn, dứt khoát). Ở đây: \"Không được để bị mê hoặc bởi nhan sắc đó. Đó là kẻ thù nguy hiểm\".<br><br>So sánh với các đáp án khác:<br>• <strong>しょうがない</strong>: \"không thể tránh khỏi, không làm gì được\" — nghĩa chấp nhận, trái với ý câu.<br>• <strong>いけない</strong>: ～てはいけない cũng có nghĩa \"không được\" nhưng mang sắc thái khuyên bảo nhẹ hơn; ならない trang trọng và dứt khoát hơn.<br>• <strong>いられない</strong>: ～ていられない = \"không thể cứ...mãi\" — hoàn toàn sai nghĩa.<div class="tip">💡 ～てはならない = tuyệt đối không được (cứng rắn hơn いけない, thường dùng trong quy tắc, cảnh báo)</div>`,

    ],

    answer: 0,
    explanation: `Cấu trúc <strong>いかに～ものか</strong> dùng trong câu gián tiếp để diễn tả mức độ (\"như thế nào, đến mức nào\"). もの ở đây biến câu thành danh từ hóa mang tính trừu tượng/khái quát. Ở đây: \"Chắc người đó không hiểu được sự ổn định cuộc sống hiện tại mong manh đến mức nào\".<br><br>• <strong>ことか</strong>: いかに～ことか thường dùng để thán than trực tiếp (\"biết bao...\"), không hợp với cấu trúc câu gián tiếp ở đây.<br>• <strong>ものだ</strong>: diễn tả lẽ thường, điều tự nhiên — không hợp nghĩa.<br>• <strong>ことに</strong>: trạng từ hóa cảm xúc (残念なことに) — sai cấu trúc.<div class="tip">💡 いかに～ものか = ... như thế nào, mức độ ra sao (dùng trong câu gián tiếp, nhấn mạnh độ sâu/mức độ)</div>`,

  },

      { word: "物事", reading: "ものごと", type: "Danh từ", meaning: "Sự vật, mọi thứ, vấn đề", example: "物事を冷静に判断する。\n(Phán đoán mọi việc một cách bình tĩnh.)" },

    ],
    choices: ["行きたくないわけではないが", "行きたくないから", "行きたいわけではないが", "行きたいというより"],
    answer: 0,
    explanation: `Cấu trúc <strong>～わけではないが</strong> nghĩa là \"không phải là không..., không hẳn là...\". Ở đây người viết giải thích: không phải là không muốn đi, nhưng lại không trả lời ngay, cứ suy nghĩ mãi rồi lỡ cơ hội.<br><br>Ngữ cảnh quan trọng: vì phần sau nói \"残念に思う\" (tiếc nuối), chứng tỏ người viết MUỐN đi nhưng không thể quyết định — vậy phải là \"không phải không muốn đi\".<br><br>• <strong>行きたくないから</strong>: \"vì không muốn đi\" — trái nghĩa với cảm xúc tiếc nuối ở cuối.<br>• <strong>行きたいわけではないが</strong>: \"không phải là muốn đi\" — cũng trái nghĩa.<br>• <strong>行きたいというより</strong>: \"thay vì muốn đi\" — không hợp ngữ cảnh.<div class="tip">💡 ～わけではない = không phải là... (phủ định nhẹ, làm rõ hiểu nhầm hoặc giải thích nội tâm)</div>`,
  },

    answer: 1,
    explanation: `Cấu trúc <strong>～ことになっている</strong> nghĩa là \"đã được sắp xếp/quy định là..., lịch trình đã định là...\". Ở đây: \"Đã có lịch gặp Nakamura tại khách sạn Prince sau 40 phút nữa\" (lịch đã được sắp xếp từ trước).<br><br>• <strong>ことになる</strong>: \"sẽ trở thành, kết quả là sẽ...\" — tương lai chưa chắc chắn, không phải đã lên kế hoạch.<br>• <strong>ことにする</strong>: \"quyết định sẽ...\" (quyết định của bản thân ngay lúc nói) — không hợp vì đây là lịch đã cố định từ trước.<br>• <strong>ことにしている</strong>: \"đặt ra quy tắc cho bản thân\" (thói quen tự đặt) — sai ngữ cảnh.<div class="tip">💡 ～ことになっている = đã được quy định/sắp xếp (lịch cố định, quy tắc từ bên ngoài)</div>`,
  },

    tag: "NGỮ PHÁP • N2",

    vocab: [
      { word: "生気", reading: "せいき", type: "Danh từ", meaning: "Sinh khí, sức sống, sức sống", example: "生気のない顔をしている。\n(Có khuôn mặt thiếu sức sống.)" },
      { word: "覗き込む", reading: "のぞきこむ", type: "Động từ nhóm 1", meaning: "Nhìn vào, nhìn chăm chú vào", example: "鏡を覗き込む。\n(Nhìn chăm chú vào gương.)" },
      { word: "目覚める", reading: "めざめる", type: "Động từ nhóm 2", meaning: "Tỉnh dậy, thức dậy", example: "朝早く目覚めた。\n(Thức dậy sớm buổi sáng.)" },
      { word: "想像", reading: "そうぞう", type: "Danh từ・Suru động từ", meaning: "Tưởng tượng, hình dung", example: "最悪の事態を想像した。\n(Đã hình dung đến tình huống tệ nhất.)" },
    ],
    choices: ["のか", "のでしかない", "のではないか", "のどころではない"],
    answer: 2,
    explanation: `Cấu trúc <strong>～のではないか</strong> nghĩa là \"có lẽ..., chẳng phải là...sao\". Dùng để diễn tả phỏng đoán, nghi ngờ nhẹ. Ở đây: \"Cô ấy tưởng tượng rằng có lẽ bất cứ lúc nào mình cũng có thể tỉnh dậy trên chiếc ghế đọc sách ở nhà\".<br><br>• <strong>のか</strong>: câu hỏi trực tiếp — không hợp với \"と想像した\".<br>• <strong>のでしかない</strong>: \"chẳng qua chỉ là...\" — hàm ý hạ thấp, không hợp ngữ cảnh.<br>• <strong>のどころではない</strong>: \"không phải lúc để...\" — sai nghĩa hoàn toàn.<div class="tip">💡 ～のではないか = có lẽ..., chẳng phải là...ư (phỏng đoán nhẹ, thường đi với と思う/と想像した)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "世の中は、愛しあうこと______、ほとんどなにもない。",

      { word: "愛し合う", reading: "あいしあう", type: "Động từ nhóm 1", meaning: "Yêu nhau (hai chiều)", example: "ふたりは愛し合っている。\n(Hai người yêu nhau.)" },
    ],
    choices: ["のより", "のほかには", "よりほかには", "しかほかには"],

    explanation: `Cấu trúc <strong>～よりほかには～ない</strong> nghĩa là \"ngoài...ra thì không có gì, chỉ có...\". Ở đây: \"Trên đời này, ngoài việc yêu nhau ra thì hầu như chẳng có gì\".<br><br>Mẫu cố định: 名詞/Vること + よりほかには + ～ない.<br><br>• <strong>のより</strong>: sai thứ tự — より phải đứng trước ほかには.<br>• <strong>のほかには</strong>: ～のほかには～ない cũng có nghĩa \"ngoài...ra\" nhưng の ở đây thừa vì 愛しあうこと đã là danh từ.<br>• <strong>しかほかには</strong>: kết hợp sai ngữ pháp — しか và ほかには không đi cùng nhau.<div class="tip">💡 ～よりほかには～ない = ngoài...ra không có gì khác (nhấn mạnh duy nhất)</div>`,
  },
  {

      { word: "対面", reading: "たいめん", type: "Danh từ・Suru động từ", meaning: "Đối mặt, gặp mặt trực tiếp", example: "はじめて対面した。\n(Gặp mặt lần đầu tiên.)" },
    ],
    choices: ["見以来", "見て以来", "見る以来", "見た以来"],

  },
