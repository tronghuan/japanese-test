<script>
var QUIZ_CONFIG = {
  backUrl: "../index.html",
  backLabel: "← Quay về trang chủ",
  questions: [
  {
    tag: "NGỮ PHÁP • N2",
    text: "「課長、きょうは熱があるので、______いただきたいのですが。」「はい、わかりました。じゃ、おだいじに。」",
    vocab: [
      { word: "課長", reading: "かちょう", type: "Danh từ", meaning: "Trưởng phòng, trưởng bộ phận", example: "課長に報告する。\n(Báo cáo cho trưởng phòng.)" },
      { word: "熱", reading: "ねつ", type: "Danh từ", meaning: "Sốt, nhiệt độ", example: "熱がある。\n(Bị sốt.)" },
    ],
    choices: ["休まれて", "お休みになって", "お休みいたして", "休ませて"],
    answer: 3,
    explanation: `Cấu trúc <strong>～させていただく</strong> là cách xin phép lịch sự (khiêm nhường): "Xin cho phép tôi được...". Ở đây: "Xin cho tôi được nghỉ ạ". 休む → 休ませて + いただきたい.<br><br>• <strong>休まれて</strong>: thể bị động/tôn kính — dùng cho người trên, không phải cho bản thân.<br>• <strong>お休みになって</strong>: tôn kính ngữ (尊敬語) — dùng khi nói về hành động người trên, sai ở đây vì đang nói về bản thân.<br>• <strong>お休みいたして</strong>: お～いたす là khiêm nhường, nhưng không nối được với いただく.<div class="tip">💡 ～させていただく = xin được phép... (khiêm nhường, xin phép người trên)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "あの医者の______、命が助かった。",
    vocab: [
      { word: "命", reading: "いのち", type: "Danh từ", meaning: "Mạng sống, sinh mệnh", example: "命を守る。\n(Bảo vệ tính mạng.)" },
      { word: "助かる", reading: "たすかる", type: "Động từ nhóm 1", meaning: "Được cứu, thoát nạn", example: "命が助かった。\n(Tính mạng được cứu.)" },
    ],
    choices: ["おかげで", "せいで", "くせに", "ためで"],
    answer: 0,
    explanation: `<strong>～のおかげで</strong> nghĩa là "nhờ có..." (kết quả tốt). Ở đây: "Nhờ có vị bác sĩ đó, tính mạng được cứu".<br><br>• <strong>せいで</strong>: "tại vì..." — dùng cho kết quả xấu, trái nghĩa.<br>• <strong>くせに</strong>: "mặc dù... (mà lại...)" — chỉ trích, phê bình.<br>• <strong>ためで</strong>: không phải mẫu tự nhiên (đúng là ため<strong>に</strong>).<div class="tip">💡 おかげで = nhờ có (kết quả tốt) | せいで = tại vì (kết quả xấu)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "彼は家族______、シンガポールに行くことになった。",
    vocab: [
      { word: "家族", reading: "かぞく", type: "Danh từ", meaning: "Gia đình", example: "家族と一緒に住む。\n(Sống cùng gia đình.)" },
    ],
    choices: ["としたら", "とすれば", "ところに", "とともに"],
    answer: 3,
    explanation: `<strong>～とともに</strong> nghĩa là "cùng với..." (đi kèm ai/cái gì). Ở đây: "Anh ấy cùng với gia đình đã được quyết định đi Singapore".<br><br>• <strong>としたら</strong>: "nếu giả sử..." — điều kiện giả định, sai nghĩa.<br>• <strong>とすれば</strong>: "nếu thế thì..." — cũng là giả định.<br>• <strong>ところに</strong>: "đúng lúc..." — sai ngữ cảnh hoàn toàn.<div class="tip">💡 ～とともに = cùng với... (đồng hành) | Cũng có nghĩa "đồng thời với" khi dùng với sự việc.</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "有能なA君のこと______、きっといい仕事をするだろう。",
    vocab: [
      { word: "有能", reading: "ゆうのう", type: "Tính từ -na", meaning: "Có năng lực, tài giỏi", example: "有能な社員。\n(Nhân viên tài giỏi.)" },
      { word: "きっと", reading: "きっと", type: "Trạng từ", meaning: "Chắc chắn, nhất định", example: "きっと成功する。\n(Chắc chắn sẽ thành công.)" },
    ],
    choices: ["ながら", "にして", "だから", "にせよ"],
    answer: 2,
    explanation: `<strong>～のことだから</strong> nghĩa là "vì là (người/vật đó)... nên chắc...". Đây là mẫu suy luận dựa trên hiểu biết về đối tượng. Ở đây: "Vì là A-kun tài giỏi thế, chắc chắn sẽ làm tốt".<br><br>• <strong>ながら</strong>: "trong khi, mặc dù" — sai cấu trúc với のこと.<br>• <strong>にして</strong>: "ở mức/tại thời điểm" — sai ngữ cảnh.<br>• <strong>にせよ</strong>: "cho dù là..." — nhượng bộ, không hợp.<div class="tip">💡 ～のことだから = vì là... nên chắc... (suy đoán dựa trên tính cách/đặc điểm đã biết)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "わたしは彼女にいろいろ親切にしたつもりなんですが、感謝されるどころか、______。",
    vocab: [
      { word: "親切", reading: "しんせつ", type: "Tính từ -na", meaning: "Tử tế, tốt bụng", example: "親切にしてもらった。\n(Được đối xử tử tế.)" },
      { word: "感謝", reading: "かんしゃ", type: "Danh từ・Suru động từ", meaning: "Cảm ơn, biết ơn", example: "感謝の気持ち。\n(Lòng biết ơn.)" },
    ],
    choices: ["うらまれました", "とても喜ばれました", "もっと感謝すべきです", "とてもうれしそうでした"],
    answer: 0,
    explanation: `Cấu trúc <strong>～どころか</strong> nghĩa là "đừng nói đến...mà còn..." (kết quả ngược lại hoàn toàn). Ở đây: "Đừng nói đến được cảm ơn, mà còn bị <strong>oán trách</strong>".<br><br>• <strong>とても喜ばれました</strong>: "rất vui" — cùng hướng tích cực, không phải ngược lại.<br>• <strong>もっと感謝すべきです</strong>: "nên cảm ơn nhiều hơn" — không hợp cấu trúc.<br>• <strong>とてもうれしそうでした</strong>: "có vẻ rất vui" — cũng tích cực, sai.<div class="tip">💡 ～どころか = đừng nói đến...mà còn... (thực tế hoàn toàn ngược lại kỳ vọng)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "桜の種類は、昔はあまり多くなかったが、今______、300種以上にもなっている。",
    vocab: [
      { word: "桜", reading: "さくら", type: "Danh từ", meaning: "Hoa anh đào", example: "桜が咲く。\n(Hoa anh đào nở.)" },
      { word: "種類", reading: "しゅるい", type: "Danh từ", meaning: "Loại, thể loại", example: "種類が多い。\n(Nhiều loại.)" },
      { word: "種", reading: "しゅ", type: "Danh từ (đơn vị đếm)", meaning: "Loại, giống", example: "300種以上ある。\n(Có hơn 300 loại.)" },
    ],
    choices: ["では", "でも", "には", "にも"],
    answer: 0,
    explanation: `<strong>今では</strong> nghĩa là "đến bây giờ thì..." — nhấn mạnh sự thay đổi so với trước. Ở đây: "Ngày xưa không nhiều, nhưng <strong>đến bây giờ thì</strong> đã hơn 300 loại".<br><br>• <strong>でも</strong>: "ngay cả bây giờ" — không nhấn mạnh sự thay đổi.<br>• <strong>には</strong>: "vào thời điểm..." — thiếu sắc thái so sánh xưa-nay.<br>• <strong>にも</strong>: "cũng ở..." — sai ngữ cảnh.<div class="tip">💡 今では = đến bây giờ thì... (nhấn mạnh sự thay đổi theo thời gian, thường dùng khi so sánh quá khứ và hiện tại)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "女性の管理職が増えたといわれているが、まだほんの１割程度______。",
    vocab: [
      { word: "女性", reading: "じょせい", type: "Danh từ", meaning: "Phụ nữ, nữ giới", example: "女性の管理職。\n(Nữ quản lý.)" },
      { word: "管理職", reading: "かんりしょく", type: "Danh từ", meaning: "Chức quản lý", example: "管理職になる。\n(Trở thành quản lý.)" },
      { word: "割", reading: "わり", type: "Danh từ (đơn vị)", meaning: "Phần mười (10%)", example: "１割は10%です。\n(1 wari là 10%.)" },
      { word: "程度", reading: "ていど", type: "Danh từ", meaning: "Mức độ, khoảng", example: "この程度で十分。\n(Mức này là đủ.)" },
    ],
    choices: ["に限りない", "にすぎない", "に達している", "に及んでいる"],
    answer: 1,
    explanation: `<strong>～にすぎない</strong> nghĩa là "chỉ là...thôi, không hơn" (nhấn mạnh ít/không đáng kể). Ở đây: "Nói là nữ quản lý tăng, nhưng vẫn <strong>chỉ khoảng 10% thôi</strong>".<br><br>• <strong>に限りない</strong>: "vô hạn" — trái nghĩa hoàn toàn.<br>• <strong>に達している</strong>: "đã đạt đến" — sắc thái tích cực, trái với "まだほんの".<br>• <strong>に及んでいる</strong>: "đã lên đến" — cũng tích cực, mâu thuẫn với ngữ cảnh.<div class="tip">💡 ～にすぎない = chỉ là...thôi (nhấn mạnh mức thấp, không đáng kể)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "先生がていねいにご説明______ので、私もよくわかりました。",
    vocab: [
      { word: "丁寧", reading: "ていねい", type: "Tính từ -na", meaning: "Tỉ mỉ, lịch sự, cẩn thận", example: "丁寧に説明する。\n(Giải thích cẩn thận.)" },
    ],
    choices: ["いただいた", "くださった", "いたした", "さしあげた"],
    answer: 1,
    explanation: `<strong>ご～くださる</strong> là tôn kính ngữ (尊敬語), dùng khi người trên (先生) làm hành động cho mình. Ở đây: "Thầy đã giải thích tỉ mỉ <strong>cho tôi</strong>".<br><br>• <strong>いただいた</strong>: ご～いただく là khiêm nhường — chủ ngữ phải là "tôi", nhưng chủ ngữ ở đây là 先生.<br>• <strong>いたした</strong>: ご～いたす là khiêm nhường — dùng cho bản thân, sai chủ ngữ.<br>• <strong>さしあげた</strong>: ～さしあげる là khiêm nhường "làm cho ai" — sai hướng.<div class="tip">💡 Chủ ngữ là người trên → ご～くださる (tôn kính) | Chủ ngữ là mình → ご～いただく (khiêm nhường)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "日本へ来てしばらくは、国へ電話はかけるまいと思っていたが、今日はさびしくてたまらず、つい______。",
    vocab: [
      { word: "かけるまい", reading: "かけるまい", type: "Thể phủ định ý chí", meaning: "Quyết không gọi", example: "もう電話はかけるまい。\n(Quyết không gọi điện nữa.)" },
      { word: "たまらず", reading: "たまらず", type: "Biểu hiện", meaning: "Không chịu nổi (nên đã...)", example: "さびしくてたまらない。\n(Cô đơn không chịu nổi.)" },
    ],
    choices: ["かけたかった", "かけるべきだ", "かけてしまった", "かけるはずだ"],
    answer: 2,
    explanation: `<strong>つい～てしまった</strong> nghĩa là "lỡ...rồi" (hành động ngoài ý muốn). Ở đây: dù đã quyết tâm không gọi, nhưng quá cô đơn nên "lỡ gọi mất rồi".<br><br>• <strong>かけたかった</strong>: "muốn gọi" — chỉ mong muốn, chưa hành động.<br>• <strong>かけるべきだ</strong>: "nên gọi" — lời khuyên, sai sắc thái.<br>• <strong>かけるはずだ</strong>: "chắc sẽ gọi" — phỏng đoán, không phù hợp.<div class="tip">💡 つい～てしまう = lỡ... mất rồi (hối hận vì hành động ngoài ý muốn, trái với quyết tâm ban đầu)</div>`,
  },
  {
    tag: "NGỮ PHÁP • N2",
    text: "商品というのは、店に並べておくだけで、それを買う人がいなければ、商品として成立しない。とすると、高すぎて品物が売れない場合には______。",
    vocab: [
      { word: "商品", reading: "しょうひん", type: "Danh từ", meaning: "Hàng hóa, sản phẩm", example: "商品を並べる。\n(Bày hàng hóa.)" },
      { word: "成立", reading: "せいりつ", type: "Danh từ・Suru động từ", meaning: "Thành lập, có hiệu lực", example: "商品として成立しない。\n(Không thành lập với tư cách hàng hóa.)" },
      { word: "品物", reading: "しなもの", type: "Danh từ", meaning: "Đồ vật, hàng hóa", example: "品物を売る。\n(Bán hàng.)" },
      { word: "買い手", reading: "かいて", type: "Danh từ", meaning: "Người mua", example: "買い手が見つかる。\n(Tìm được người mua.)" },
    ],
    choices: ["値下げすることはない", "値下げすべきではない", "値下げせざるをえない", "値下げするおそれがある"],
    answer: 2,
    explanation: `<strong>～ざるをえない</strong> nghĩa là "không thể không..., buộc phải..." (bắt buộc bởi hoàn cảnh). Ở đây: nếu giá quá cao mà không ai mua thì "buộc phải hạ giá". Câu tiếp theo giải thích: nhờ hạ giá mà tìm được người mua → mới thành hàng hóa.<br><br>• <strong>値下げすることはない</strong>: "không cần hạ giá" — mâu thuẫn với logic.<br>• <strong>値下げすべきではない</strong>: "không nên hạ giá" — cũng trái nghĩa.<br>• <strong>値下げするおそれがある</strong>: "có nguy cơ hạ giá" — sai sắc thái (ở đây hạ giá là giải pháp, không phải nguy cơ).<div class="tip">💡 ～ざるをえない = buộc phải... (không có lựa chọn nào khác, bị hoàn cảnh bắt buộc)</div>`,
  },
  ],
