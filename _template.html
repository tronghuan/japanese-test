<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語クイズ • QUIZ TITLE HERE</title>
<link rel="stylesheet" href="../css/quiz-common.css">
</head>
<body>

<header data-bg-char="文">
  <div class="header-badge">N2 JLPT • NGỮ PHÁP ①</div>
  <h1>N2 文法<span>クイズ</span>①</h1>
  <p class="sub">Trắc nghiệm ngữ pháp N2 · Bài 1</p>
</header>

<a class="back-link" href="../index.html">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
  Quay về trang chủ
</a>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span class="progress-text" id="progressText">1 / 10</span>
  <span class="score-badge" id="scoreBadge">0 điểm</span>
</div>

<main>
  <div class="quiz-card" id="quizCard">
    <div class="q-header">
      <span class="q-num" id="qNum">Q1</span>
      <div class="q-body">
        <span class="q-tag" id="qTag"></span>
        <div class="q-text" id="qText"></div>
      </div>
    </div>
    <div class="vocab-strip" id="vocabStrip">
      <span class="vocab-label">🔍 TRA TỪ:</span>
    </div>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation">
      <div class="exp-head">· GIẢI THÍCH ·</div>
      <div class="exp-body" id="expBody"></div>
    </div>
    <div class="card-footer">
      <button class="exp-toggle" id="expToggle" onclick="toggleExp()">📖 Xem giải thích</button>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        Câu tiếp theo
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-kanji" id="resultKanji">合格</div>
    <div class="result-title" id="resultTitle">Xuất sắc!</div>
    <div class="result-sub" id="resultSub">Bạn đã hoàn thành bài trắc nghiệm</div>
    <div class="result-score-big" id="resultScore">0<span>/10</span></div>
    <div class="result-label">SỐ CÂU ĐÚNG</div>
    <button class="restart-btn" onclick="restart()">🔄 Làm lại từ đầu</button>
  </div>
</main>

<div class="vocab-popup" id="vocabPopup" onclick="closeVocab(event)">
  <div class="vocab-popup-box">
    <div class="vp-top">
      <div>
        <div class="vp-word" id="vpWord"></div>
        <div class="vp-reading" id="vpReading"></div>
      </div>
      <button class="vp-close" onclick="closeVocabBtn()">✕</button>
    </div>
    <div class="vp-body">
      <div class="vp-type" id="vpType"></div>
      <div class="vp-meaning" id="vpMeaning"></div>
      <div class="vp-example" id="vpExample"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!--
  ╔══════════════════════════════════════════════════╗
  ║  CHỈ CẦN THAY ĐỔI PHẦN QUIZ_CONFIG BÊN DƯỚI   ║
  ║  Mỗi bài quiz mới chỉ cần copy file này và     ║
  ║  thay đổi dữ liệu câu hỏi trong QUIZ_CONFIG.   ║
  ╚══════════════════════════════════════════════════╝
-->
<script>
const QUIZ_CONFIG = {
  backUrl: "../index.html",
  backLabel: "← Quay về trang chủ",
  questions: [
    // Copy mẫu câu hỏi bên dưới và thay đổi nội dung:
    {
      tag: "NGỮ PHÁP • N2",
      text: "Nội dung câu hỏi có ______ chỗ trống.",
      vocab: [
        {
          word: "漢字",
          reading: "かんじ",
          type: "Danh từ",
          meaning: "Chữ Hán",
          example: "漢字を書く。\n(Viết chữ Hán.)"
        }
      ],
      choices: ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"],
      answer: 0, // index đáp án đúng (0 = A, 1 = B, 2 = C, 3 = D)
      explanation: `Giải thích chi tiết về đáp án đúng.<div class="tip">💡 Mẹo ghi nhớ</div>`
    }
  ]
};
</script>
<script src="../js/quiz-engine.js"></script>
</body>
</html>
